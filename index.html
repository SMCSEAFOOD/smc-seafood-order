<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SMC Seafood</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#f3f7fb;
}

header{
background:#003B73;
color:white;
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.sub{
font-size:15px;
margin-top:5px;
font-weight:normal;
}

.banner{
width:100%;
max-height:250px;
object-fit:cover;
}

.container{
padding:15px;
}

.card{

background:white;
border-radius:15px;
padding:15px;
margin-bottom:15px;
box-shadow:0 5px 15px rgba(0,0,0,.1);

}

.price{

color:#0a7cff;
font-size:22px;
font-weight:bold;

}

button{

background:#0a7cff;
color:white;
border:none;
padding:12px;
border-radius:10px;
width:100%;
font-size:16px;
margin-top:10px;

}

.footer{

position:fixed;
bottom:0;
left:0;
right:0;

background:white;

padding:15px;

box-shadow:0 -3px 10px rgba(0,0,0,.1);

}

</style>

</head>

<body>

<header>

SMC SEAFOOD

<div class="sub">

Fresh From The Sea,
Quality For You

</div>

</header>

<img class="banner" src="banner.jpg">

<div class="container">

<div class="card">

<h2>🦐 Udang Premium</h2>

<p class="price">

Rp90.000 / Kg

</p>

<button>

Pesan Udang

</button>

</div>

<div class="card">

<h2>🦑 Cumi Premium</h2>

<p class="price">

Rp90.000 / Kg

</p>

<button>

Pesan Cumi

</button>

</div>

</div>

<div class="footer">

<b>Total : Rp0</b>

<button>

Checkout

</button>

</div>

</body>

</html>
