<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMC Seafood</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header class="header">

<div class="logo">

<h1>SMC SEAFOOD</h1>

<p>Fresh From The Sea, Quality For You</p>

</div>

</header>

<section class="hero">

<img src="banner.jpg" alt="SMC Seafood">

</section>

<section class="container">

<div class="product">

<h2>🦐 Udang Premium</h2>

<p class="price">Rp90.000 / Kg</p>

<input type="number" id="udang" min="0" value="0">

</div>

<div class="product">

<h2>🦑 Cumi Premium</h2>

<p class="price">Rp90.000 / Kg</p>

<input type="number" id="cumi" min="0" value="0">

</div>

</section>

<section class="checkout">

<h2>Form Pemesanan</h2>

<input id="nama" type="text" placeholder="Nama Lengkap">

<input id="hp" type="tel" placeholder="Nomor HP">

<textarea id="alamat" placeholder="Alamat Lengkap"></textarea>

<textarea id="catatan" placeholder="Catatan (Opsional)"></textarea>

<button onclick="pesan()">Pesan Sekarang</button>

</section>

<script src="script.js"></script>

</body>
</html>
